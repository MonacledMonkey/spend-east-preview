<svg width="960" height="720" viewBox="0 0 960 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Spend East Issue #1 brand and UI asset sidecar</title>
  <desc id="desc">Implementation-ready SVG symbol sheet for the sandbox Spend East dashboard: logo mark, QR action icons, service icons, buttons, chips, and card style samples.</desc>
  <defs>
    <linearGradient id="se-hero-gradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#10264A"/>
      <stop offset="1" stop-color="#174275"/>
    </linearGradient>
    <filter id="se-soft-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#10264A" flood-opacity="0.10"/>
    </filter>
    <style>
      .bg{fill:#F5F7FB}.card{fill:#fff;filter:url(#se-soft-shadow)}.title{font:800 20px Inter,Arial,sans-serif;fill:#10264A}.section{font:800 15px Inter,Arial,sans-serif;fill:#101828}.label{font:700 11px Inter,Arial,sans-serif;fill:#667085;letter-spacing:.3px}.body{font:700 12px Inter,Arial,sans-serif;fill:#344054}.meta{font:600 11px Inter,Arial,sans-serif;fill:#667085}.micro{font:800 9px Inter,Arial,sans-serif;fill:#667085;letter-spacing:.4px}.white{fill:#fff}.navyStroke{stroke:#10264A}.redStroke{stroke:#C73A3A}.greenStroke{stroke:#0F8A5F}.orangeStroke{stroke:#B7791F}.line{fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}.thin{fill:none;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}.token{font:700 11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;fill:#344054}
    </style>

    <symbol id="se-logo-mark-primary" viewBox="0 0 64 64">
      <circle cx="32" cy="32" r="30" fill="#10264A"/>
      <path d="M18 19h18M18 19v26M18 32h15M18 45h18" stroke="#FFFFFF" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M46 19H34M46 19v26M46 32H35M46 45H34" stroke="#C73A3A" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <symbol id="se-logo-mark-small" viewBox="0 0 32 32">
      <circle cx="16" cy="16" r="15" fill="#10264A"/>
      <path d="M9 10h9M9 10v12M9 16h8M9 22h9" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M23 10h-7M23 10v12M23 16h-7M23 22h-7" stroke="#C73A3A" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>

    <symbol id="se-icon-scan" viewBox="0 0 24 24">
      <path class="line" d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3M8 12h8M12 8v8"/>
    </symbol>
    <symbol id="se-icon-pay-collect" viewBox="0 0 24 24">
      <path class="line" d="M8 5l4 6 4-6M8 11h8M9 15h6M12 11v8"/>
      <path class="line" d="M5 19h14"/>
    </symbol>
    <symbol id="se-icon-travel" viewBox="0 0 24 24">
      <path class="line" d="M3 13l18-7-7 18-3-8-8-3Z"/>
      <path class="line" d="M11 16l4-4"/>
    </symbol>
    <symbol id="se-icon-pocket" viewBox="0 0 24 24">
      <path class="line" d="M5 7h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V9a2 2 0 0 1 2-2Z"/>
      <path class="line" d="M16 11h5v4h-5a2 2 0 0 1 0-4Z"/>
      <path class="line" d="M7 7V5h10v2"/>
    </symbol>

    <symbol id="se-icon-transfer" viewBox="0 0 24 24"><path class="line" d="M7 7h11M14 3l4 4-4 4M17 17H6M10 13l-4 4 4 4"/></symbol>
    <symbol id="se-icon-fx" viewBox="0 0 24 24"><path class="line" d="M5 8h9M10 4l4 4-4 4M19 16h-9M14 12l-4 4 4 4"/></symbol>
    <symbol id="se-icon-topup" viewBox="0 0 24 24"><path class="line" d="M8 4h8a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2Z"/><path class="line" d="M12 8v6M9 11h6M10 17h4"/></symbol>
    <symbol id="se-icon-utilities" viewBox="0 0 24 24"><path class="line" d="M12 3v3M12 18v3M4.6 6.6l2.1 2.1M17.3 15.3l2.1 2.1M3 12h3M18 12h3M4.6 17.4l2.1-2.1M17.3 8.7l2.1-2.1"/><circle cx="12" cy="12" r="4" class="line"/></symbol>
    <symbol id="se-icon-cards" viewBox="0 0 24 24"><rect x="3" y="6" width="18" height="12" rx="2" class="line"/><path class="line" d="M3 10h18M7 15h4"/></symbol>
    <symbol id="se-icon-merchants" viewBox="0 0 24 24"><path class="line" d="M5 10h14l-1-5H6l-1 5Z"/><path class="line" d="M7 10v9M17 10v9M5 19h14M9 19v-5h6v5"/></symbol>
    <symbol id="se-icon-rewards" viewBox="0 0 24 24"><path class="line" d="M12 3l2.7 5.5 6.1.9-4.4 4.3 1 6.1L12 17l-5.4 2.8 1-6.1-4.4-4.3 6.1-.9L12 3Z"/></symbol>
    <symbol id="se-icon-more" viewBox="0 0 24 24"><circle cx="6" cy="12" r="1.8" fill="currentColor"/><circle cx="12" cy="12" r="1.8" fill="currentColor"/><circle cx="18" cy="12" r="1.8" fill="currentColor"/></symbol>
    <symbol id="se-icon-home" viewBox="0 0 24 24"><path class="line" d="M4 11l8-7 8 7v9a1 1 0 0 1-1 1h-5v-6h-4v6H5a1 1 0 0 1-1-1v-9Z"/></symbol>
    <symbol id="se-icon-activity" viewBox="0 0 24 24"><path class="line" d="M4 17l5-5 4 4 7-9"/><path class="line" d="M4 20h16"/></symbol>
  </defs>

  <rect width="960" height="720" class="bg"/>
  <text x="42" y="48" class="title">Spend East dashboard asset sidecar</text>
  <text x="42" y="70" class="meta">Issue #1 · sandbox-only UI assets · next owner: builder</text>

  <rect x="40" y="98" width="260" height="180" rx="24" class="card"/>
  <text x="62" y="130" class="section">Logo mark</text>
  <use href="#se-logo-mark-primary" x="62" y="150" width="82" height="82"/>
  <use href="#se-logo-mark-small" x="166" y="168" width="46" height="46"/>
  <text x="62" y="252" class="meta">Path-based split E rail mark; no font glyph dependency.</text>

  <rect x="330" y="98" width="590" height="180" rx="24" class="card"/>
  <text x="352" y="130" class="section">QR action rail icons</text>
  <g transform="translate(352 154)">
    <circle cx="30" cy="30" r="30" fill="#FEF2F2"/><use href="#se-icon-scan" x="18" y="18" width="24" height="24" class="redStroke"/><text x="14" y="80" class="body">Scan</text>
  </g>
  <g transform="translate(482 154)">
    <circle cx="30" cy="30" r="30" fill="#EEF4FF"/><use href="#se-icon-pay-collect" x="18" y="18" width="24" height="24" class="navyStroke"/><text x="-2" y="80" class="body">Pay/Collect</text>
  </g>
  <g transform="translate(626 154)">
    <circle cx="30" cy="30" r="30" fill="#ECFDF3"/><use href="#se-icon-travel" x="18" y="18" width="24" height="24" class="greenStroke"/><text x="9" y="80" class="body">Travel</text>
  </g>
  <g transform="translate(756 154)">
    <circle cx="30" cy="30" r="30" fill="#FFF7ED"/><use href="#se-icon-pocket" x="18" y="18" width="24" height="24" class="orangeStroke"/><text x="7" y="80" class="body">Pocket</text>
  </g>

  <rect x="40" y="306" width="420" height="230" rx="24" class="card"/>
  <text x="62" y="338" class="section">Service grid icon set</text>
  <g transform="translate(62 366)" class="navyStroke">
    <g><use href="#se-icon-transfer" width="24" height="24"/><text x="-8" y="45" class="body">Transfer</text></g>
    <g transform="translate(92 0)"><use href="#se-icon-fx" width="24" height="24"/><text x="-16" y="45" class="body">FX Convert</text></g>
    <g transform="translate(196 0)"><use href="#se-icon-topup" width="24" height="24"/><text x="-23" y="45" class="body">Mobile Top-up</text></g>
    <g transform="translate(322 0)"><use href="#se-icon-utilities" width="24" height="24"/><text x="-14" y="45" class="body">Utilities</text></g>
    <g transform="translate(0 90)"><use href="#se-icon-cards" width="24" height="24"/><text x="-4" y="45" class="body">Cards</text></g>
    <g transform="translate(92 90)"><use href="#se-icon-merchants" width="24" height="24"/><text x="-18" y="45" class="body">Merchants</text></g>
    <g transform="translate(196 90)"><use href="#se-icon-rewards" width="24" height="24"/><text x="-14" y="45" class="body">Rewards</text></g>
    <g transform="translate(322 90)" style="color:#10264A"><use href="#se-icon-more" width="24" height="24"/><text x="-2" y="45" class="body">More</text></g>
  </g>

  <rect x="490" y="306" width="430" height="230" rx="24" class="card"/>
  <text x="512" y="338" class="section">Buttons, chips, and card samples</text>
  <rect x="512" y="364" width="170" height="70" rx="22" fill="url(#se-hero-gradient)"/>
  <text x="528" y="389" class="micro" fill="#C7D7FE">TOTAL SPENDING POWER</text>
  <text x="528" y="416" style="font:900 27px Inter,Arial,sans-serif;fill:#fff">$500.00</text>
  <rect x="708" y="364" width="78" height="24" rx="12" fill="#FEF2F2" stroke="#FECACA"/>
  <text x="721" y="380" style="font:800 10px Inter,Arial,sans-serif;fill:#B42318">SANDBOX</text>
  <rect x="512" y="454" width="116" height="30" rx="15" fill="#C73A3A"/>
  <text x="538" y="473" style="font:800 11px Inter,Arial,sans-serif;fill:#fff">Confirm demo</text>
  <rect x="640" y="454" width="102" height="30" rx="15" fill="#F2F4F7"/>
  <text x="664" y="473" style="font:800 11px Inter,Arial,sans-serif;fill:#344054">Edit amount</text>
  <rect x="760" y="454" width="74" height="24" rx="12" fill="#ECFDF3"/>
  <text x="781" y="470" style="font:800 10px Inter,Arial,sans-serif;fill:#0F8A5F">OK</text>
  <rect x="512" y="500" width="320" height="1" fill="#EAECF0"/>
  <text x="512" y="522" class="meta">Use soft cards, pill controls, 2px line icons, and explicit sandbox copy.</text>

  <rect x="40" y="570" width="880" height="98" rx="24" fill="#FFFFFF"/>
  <text x="62" y="602" class="section">Implementation notes</text>
  <text x="62" y="626" class="meta">Symbols in this sheet are reusable via SVG export or react-native-svg path conversion. Keep QR/payment copy sandbox-only.</text>
  <text x="62" y="648" class="token">Related: docs/ux/issue-1-asset-art-direction-sidecar.md · artifacts/assets/issue-1-spend-east-asset-tokens.json</text>
</svg>
